<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team Scoreboard</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #121b2f;
      --text: #e8eefc;
      --muted: #a9b6d6;
      --accent: #6aa3ff;
      --good: #36d399;
      --border: rgba(255,255,255,0.08);
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% 10%, #142043 0%, var(--bg) 45%);
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.2px;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .card {
      background: rgba(18, 27, 47, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin: 12px 0 16px;
    }

    .search {
      flex: 1;
      min-width: 220px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .search input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
    }

    .btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn:hover { border-color: rgba(255,255,255,0.18); }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-weight: 600;
    }

    tr.leader {
      background: rgba(54, 211, 153, 0.08);
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .badge.lead {
      color: var(--good);
      border-color: rgba(54, 211, 153, 0.35);
      background: rgba(54, 211, 153, 0.08);
    }

    .score {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
      color: #dbe6ff;
    }

    footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Team Scoreboard</h1>
        <div class="sub">Sorted by score • Highlights current leader(s)</div>
      </div>
      <div class="badge" id="lastUpdated">Last updated: —</div>
    </header>

    <div class="card">
      <div class="controls">
        <div class="search">
          🔎 <input id="search" placeholder="Search name / team..." />
        </div>
        <button class="btn" id="toggleSort">Sort: High → Low</button>
      </div>

      <table aria-label="Scoreboard table">
        <thead>
          <tr>
            <th style="width:70px;">Rank</th>
            <th>Name</th>
            <th>Team</th>
            <th style="width:120px;">Score</th>
            <th style="width:140px;">Status</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>

      <footer>
        Tip: Edit the <code>players</code> list in the script to update scores.
      </footer>
    </div>
  </div>

  <script>
    // 1) EDIT THIS LIST to update the scoreboard
    const players = [
      { name: "Aina", team: "Blue", score: 18 },
      { name: "Kumar", team: "Red", score: 22 },
      { name: "Haziq", team: "Blue", score: 14 },
      { name: "Mei", team: "Green", score: 22 },
      { name: "Sarah", team: "Red", score: 9 },
      { name: "User1", team: "Purple", score: 10 },       
    ];

    // 2) Simple UI logic: sort, search, leader highlight
    let sortDesc = true;

    const rowsEl = document.getElementById("rows");
    const searchEl = document.getElementById("search");
    const toggleSortEl = document.getElementById("toggleSort");
    const lastUpdatedEl = document.getElementById("lastUpdated");

    function render() {
      const q = (searchEl.value || "").toLowerCase().trim();

      // filter
      const filtered = players.filter(p =>
        p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q)
      );

      // sort
      filtered.sort((a,b) => sortDesc ? (b.score - a.score) : (a.score - b.score));

      // leader detection (supports ties)
      const topScore = filtered.length ? Math.max(...filtered.map(p => p.score)) : null;

      rowsEl.innerHTML = "";

      filtered.forEach((p, idx) => {
        const isLeader = topScore !== null && p.score === topScore;
        const tr = document.createElement("tr");
        if (isLeader) tr.classList.add("leader");

        tr.innerHTML = `
          <td>${idx + 1}</td>
          <td>${escapeHtml(p.name)}</td>
          <td>${escapeHtml(p.team)}</td>
          <td class="score">${p.score}</td>
          <td>
            <span class="badge ${isLeader ? "lead" : ""}">
              ${isLeader ? "Leading" : "—"}
            </span>
          </td>
        `;
        rowsEl.appendChild(tr);
      });

      lastUpdatedEl.textContent = "Last updated: " + new Date().toLocaleString();
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[s]));
    }

    toggleSortEl.addEventListener("click", () => {
      sortDesc = !sortDesc;
      toggleSortEl.textContent = sortDesc ? "Sort: High → Low" : "Sort: Low → High";
      render();
    });

    searchEl.addEventListener("input", render);

    render();
  </script>
</body>
</html>
